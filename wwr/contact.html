<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Exciting Expeditions Rafting</title>
    <meta name="description"
      content="Contact Exciting Expeditions for questions about our rafting trips in Brazil and Paraguay.">
    <meta name="author" content="Nathan Almeida da Costa">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="Exciting Expeditions Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1 class="contact-title">Contact Us</h1>

        <section class="contact-info">
            <div class="address-card">
                <h2>Our Office</h2>
                <p>📍 123 River Run Lane, Pelotas, Brazil</p>
                <p>📞 (53) 9999-9999</p>
                <p>📧 info@excitingexpeditions.com</p>
            </div>
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d13568.423456789!2d-52.342!3d-31.765!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v123456789"
                  width="100%" height="300" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <section class="team">
            <h2>Meet Our Expert Guides</h2>
            <div class="team-grid">
                <figure>
                    <img src="images/happy-client.jpg" alt="Expedition Manager">
                    <figcaption><strong>Alex Rivers</strong> - Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/happy-client.jpg" alt="Lead Guide">
                    <figcaption><strong>Jordan Swift</strong> - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/happy-client.jpg" alt="Safety Officer">
                    <figcaption><strong>Sam Safety</strong> - Safety Officer</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form-section">
            <h2>Send us a Message</h2>
            <form action="#" method="post" class="contact-form">
                <div class="form-item">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-item">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <fieldset>
                    <legend>Purpose of Message:</legend>
                    <label><input type="radio" name="purpose" value="general" checked> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>
                </fieldset>
                <div class="form-item">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                <div class="form-item checkbox-item">
                    <input type="checkbox" id="news" name="news">
                    <label for="news">Please subscribe me to the monthly newsletter</label>
                </div>
                <button type="submit">Send Adventure Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 🚣 Exciting Expeditions 🚣 Nathan Almeida da Costa</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg" alt="Instagram"></a>
        </nav>
    </footer>
</body>

</html>
