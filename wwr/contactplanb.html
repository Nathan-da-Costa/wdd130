<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us | Exciting Expeditions</title>
    <meta name="description"
      content="Get in touch with Exciting Expeditions for the best white water rafting adventures in Brazil. We are here to help you plan your trip.">
    <meta name="author" content="Nathan Almeida da Costa">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="Rafting Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main class="contact-page">
        <h1>Contact Exciting Expeditions</h1>

        <div class="contact-grid-container">

            <section class="contact-info">
                <h2>Our Office</h2>
                <p>123 River Run Lane, Pelotas, Brazil</p>
                <p>(53) 9999-9999</p>
                <p>info@excitingexpeditions.com</p>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d13570.47146524855!2d-52.34!3d-31.76!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1710000000000"
                  width="600" height="450" allowfullscreen="" loading="lazy"></iframe>
            </section>

            <section class="contact-form">
                <h2>Send us a Message</h2>
                <form action="#" method="post">
                    <div class="form-item">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your Name">
                    </div>

                    <div class="form-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required
                          placeholder="Your Email">
                    </div>

                    <fieldset>
                        <legend>Purpose of Message</legend>
                        <label><input type="radio" id="general" name="purpose" value="general">
                            General Inquiry</label>
                        <label><input type="radio" id="reservation" name="purpose"
                              value="reservation"> Reservation Question</label>
                        <label><input type="radio" id="website" name="purpose" value="website">
                            Website Suggestion</label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4"
                          placeholder="Type here"></textarea>
                    </div>

                    <div class="checkbox-item">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">Please subscribe me to the monthly
                            newsletter</label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </section>
        </div>

        <section class="guides-section">
            <h2>We Are Here to Serve You</h2>
            <div class="guides-grid">
                <figure>
                    <img src="images/happy-client.jpg" alt="Alex River Manager">
                    <figcaption><strong>Alex River</strong><br>Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/happy-client.jpg" alt="Jordan Swift Lead Guide">
                    <figcaption><strong>Jordan Swift</strong><br>Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/happy-client.jpg" alt="Sam Safety Officer">
                    <figcaption><strong>Sam Safety</strong><br>Safety Officer</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 🚣 Exciting Expeditions 🚣 Nathan Almeida da Costa</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook Icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg"
                  alt="Instagram Icon"></a>
        </nav>
    </footer>
</body>

</html>
